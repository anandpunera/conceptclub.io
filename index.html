function spawnShockwave(x, y) {
  shockwaves.push({
    x, y, radius: 10, maxRadius: 350,
    lineWidth: 10, alpha: 1.0,
    color: '#FF6600',
  });
}

function spawnScorch(x, y) {
  scorchMarks.push({ x, y, radius: 100 + Math.random()*40, alpha: 0.6 });
}

function updateParticles(dt) {
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;

    if (p.type === 'smoke') {
      p.vy -= 0.02; // smoke rises slowly
      p.vx *= 0.98; // drag
      p.size += p.growRate; // smoke expands
    } else if (p.type === 'ember') {
      p.vy += 0.15; // lighter gravity for embers
      // Store trail positions
      if (p.trail) {
        p.trail.push({ x: p.x, y: p.y, life: 0.5 });
        if (p.trail.length > 6) p.trail.shift();
        p.trail.forEach(t => t.life -= 0.08);
      }
    } else if (p.type === 'fire') {
      p.vy += 0.1; // light gravity
      p.vx *= 0.97; // friction
      p.size *= 0.98; // shrink
    } else {
      p.vy += 0.3; // standard gravity
    }

    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i=textPopups.length-1; i>=0; i--) {
    const t = textPopups[i];
    t.y += t.vy; t.life -= 0.018; t.scale = Math.min(t.scale+0.15, 1);
    if (t.life <= 0) textPopups.splice(i, 1);
  }
  // Update shockwaves
  for (let i=shockwaves.length-1; i>=0; i--) {
    const sw = shockwaves[i];
    sw.radius += 10;
    sw.alpha = Math.max(0, 1 - sw.radius / sw.maxRadius);
    sw.lineWidth = Math.max(1, 10 * (1 - sw.radius / sw.maxRadius));
    if (sw.radius >= sw.maxRadius) shockwaves.splice(i, 1);
  }
  // Fade scorch marks
  for (let i=scorchMarks.length-1; i>=0; i--) {
    scorchMarks[i].alpha -= 0.003;
    if (scorchMarks[i].alpha <= 0) scorchMarks.splice(i, 1);
  }
  // Decay bomb flash
  if (bombFlash > 0.01) bombFlash *= 0.88;
  else bombFlash = 0;
}

function drawScorchMarks() {
  scorchMarks.forEach(sm => {
    ctx.globalAlpha = sm.alpha * 0.5;
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(sm.x, sm.y, sm.radius, sm.radius * 0.4, 0, 0, Math.PI*2);
    ctx.fill();
    // Inner darker core
    ctx.globalAlpha = sm.alpha * 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(sm.x, sm.y, sm.radius * 0.5, sm.radius * 0.2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function drawShockwaves() {
  shockwaves.forEach(sw => {
    ctx.globalAlpha = sw.alpha * 0.7;
    ctx.strokeStyle = sw.color;
    ctx.lineWidth = sw.lineWidth;
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI*2);
    ctx.stroke();
    // Inner bright ring
    ctx.globalAlpha = sw.alpha * 0.3;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = sw.lineWidth * 0.4;
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.radius * 0.95, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;

    if (p.type === 'smoke') {
      // Smoke: soft, large, semi-transparent circles
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      grad.addColorStop(0, `rgba(60,60,60,${p.life * 0.4})`);
      grad.addColorStop(0.6, `rgba(80,80,80,${p.life * 0.2})`);
      grad.addColorStop(1, `rgba(100,100,100,0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    } else if (p.type === 'ember') {
      // Ember trail
      if (p.trail) {
        p.trail.forEach((t, idx) => {
          if (t.life > 0) {
            ctx.globalAlpha = t.life * p.life * 0.6;
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.arc(t.x, t.y, p.size * (0.3 + idx * 0.1), 0, Math.PI*2);
            ctx.fill();
          }
        });
        ctx.globalAlpha = p.life;
      }
      // Bright ember core
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    } else if (p.type === 'fire') {
      // Fire: glowing circles with bright center
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.3, p.color);
      grad.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI*2); ctx.fill();
    } else if (p.type === 'star') {
      drawStar(p.x, p.y, p.size, p.color);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
  textPopups.forEach(t => {
    ctx.globalAlpha = t.life;
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.scale(t.scale, t.scale);
    ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.strokeText(t.text, 0, 0);
    ctx.fillStyle = t.color;
    ctx.fillText(t.text, 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  });
}

// ---- HIT DETECTION ----
function checkPunchHits() {
  for (let pi=punches.length-1; pi>=0; pi--) {
    const p = punches[pi];
    if (p.hit) continue;
    const progress = p.elapsed / p.duration;
    if (progress < 0.85) continue; // only check near end of flight

    const w = weapons[p.weapon];
    let hitAny = false;

    // Sort uncles by depth so we hit the closest (frontmost) first
    const sorted = [...uncles].filter(u => u.state === 'walking').sort((a,b) => b.y - a.y);

    for (const u of sorted) {
      const s = depthScale(u.y);
      const hitR = 40 * s;
      const dx = p.x - u.x;
      const dy = p.y - (u.y - 35*s); // aim at torso area
      if (dx*dx + dy*dy < hitR*hitR) {
        p.hit = true;
        hitAny = true;
        processHit(u, w, p);

        // Splash
        if (w.splash) {
          for (const u2 of uncles) {
            if (u2 !== u && u2.state === 'walking' && !u2.isBomb) {
              const d2 = Math.sqrt((u2.x-u.x)**2 + (u2.y-u.y)**2);
              if (d2 < w.splash) {
                u2.hp--;
                if (u2.hp <= 0) { killUncle(u2, w); }
                else { spawnParticles(u2.x, u2.y-20, '#9b59b6', 6); spawnText(u2.x, u2.y-50, 'SPLASH!', '#9b59b6'); }
              }
            }
          }
        }
        // Slow
        if (w.slow) {
          uncles.forEach(u2 => {
            if (u2 !== u && u2.state === 'walking' && !u2.slowed) {
              u2.slowed = true; u2.speed *= 0.4;
            }
          });
        }
        break;
      }
    }

    // If punch reached target without hitting, show miss
    if (progress >= 1 && !p.hit) {
      p.hit = true;
      spawnText(p.tx, p.ty - 10, 'MISS!', '#95a5a6');
      sfxMiss();
    }
  }
}

function processHit(u, w, p) {
  if (u.isBomb) {
    shakeIntensity = 18;
    spawnParticles(u.x, u.y - 20, '#e74c3c', 25);
    spawnText(u.x, u.y - 60, 'BOOM!', '#e74c3c');
    spawnText(u.x, u.y - 80, '+2 UNCLES!', '#e74c3c');
    u.state = 'hit'; u.hitTimer = 0;
    sfxBomb();
    // Punishment: spawn 2 extra uncles
    spawnUncle(); spawnUncle();
    return;
  }
  u.hp -= w.damage;
  if (u.hp <= 0) {
    killUncle(u, w);
  } else {
    shakeIntensity = 5;
    spawnParticles(u.x, u.y - 20, '#f39c12', 8);
    spawnText(u.x, u.y - 50, 'HIT!', '#f39c12');
    sfxHit();
  }
}

function killUncle(u, w) {
  u.state = 'flying'; u.hitTimer = 0;
  sfxKill();
  let pts = u.points;
  if (w.bonusMult) pts = Math.floor(pts * w.bonusMult);
  score += pts;
  shakeIntensity = 10;
  const pops = ['POW!','BAM!','WHAM!','BONK!','SMACK!'];
  spawnText(u.x, u.y - 60, rnd(pops), w.color);
  spawnParticles(u.x, u.y - 20, w.color, 18);
  spawnText(u.x + 25, u.y - 40, `+${pts}`, '#f1c40f');
  scoreDisplayEl.textContent = score;
  checkWeaponUnlocks();
  checkLevelUp();

  // Track kills — award bomb every 10 kills
  totalKills++;
  if (totalKills % 10 === 0) {
    bombCount++;
    updateBombBtn();
    showNotif(`💣 BOMB EARNED! (${bombCount}) Tap 💣 or press [B]!`);
    sfxWeaponUnlock();
  }

  // Set up ragdoll flight trajectory — visible arc, not too high
  const flyDir = (Math.random() < 0.5 ? -1 : 1); // fly left or right
  u.flyVx = flyDir * (200 + Math.random() * 250);  // strong horizontal velocity
  u.flyVy = -(150 + Math.random() * 100);           // gentle upward launch (stays on screen)
  u.flyGravity = 400;                                // moderate gravity
  u.flyRotation = 0;
  u.flyRotSpeed = flyDir * (5 + Math.random() * 8);  // spin speed (radians/sec)
  u.flyStartX = u.x;
  u.flyStartY = u.y;
  u.flyOffX = 0;
  u.flyOffY = 0;
  u.flyLanded = false;
  u.flyLandTimer = 0;
  u.flyOpacity = 1;
  u.facing = 'front'; // show the X-eyes face
}

// ---- BOMB ABILITY ----
function useBomb() {
  if (bombCount <= 0 || gameState !== 'playing') return;
  bombCount--;
  updateBombBtn();

  const cx = W / 2, cy = H / 2;

  // ===== PHASE 1: INITIAL FLASH + SHOCKWAVE (instant) =====
  bombFlash = 1.0;           // white screen flash
  shakeIntensity = 35;       // massive shake
  bombSlowMo = 400;          // 400ms slow-motion
  sfxBomb();

  // Shockwave rings (staggered)
  spawnShockwave(cx, cy);
  setTimeout(() => spawnShockwave(cx, cy), 80);
  setTimeout(() => spawnShockwave(cx, cy), 180);

  // Ground scorch mark
  spawnScorch(cx, cy);

  // ===== PHASE 2: FIREBALL (instant) =====
  spawnFireParticles(cx, cy, 50);          // central fireball burst
  spawnFireParticles(cx - 80, cy, 15);     // side fireballs
  spawnFireParticles(cx + 80, cy, 15);
  spawnFireParticles(cx, cy - 60, 15);

  // BOOM text
  spawnText(cx, cy - 50, '💥 BOOM! 💥', '#FF4500');

  // ===== PHASE 3: EMBERS (slight delay) =====
  setTimeout(() => {
    spawnEmberParticles(cx, cy, 30);
    spawnEmberParticles(cx - 60, cy + 20, 15);
    spawnEmberParticles(cx + 60, cy + 20, 15);
  }, 100);

  // ===== PHASE 4: SMOKE (delayed) =====
  setTimeout(() => {
    spawnSmokeParticles(cx, cy, 20);
    spawnSmokeParticles(cx - 50, cy + 30, 10);
    spawnSmokeParticles(cx + 50, cy + 30, 10);
  }, 200);

  // ===== KILL ALL UNCLES =====
  const targets = uncles.filter(u => u.state === 'walking' && !u.isBomb);
  let killCount = 0;
  const prevKills = totalKills;
  targets.forEach(u => {
    u.state = 'flying'; u.hitTimer = 0;
    let pts = u.points * 2; // double points for bomb kills
    score += pts;
    killCount++;
    totalKills++;

    // Fire particles at each uncle's position
    spawnFireParticles(u.x, u.y - 20, 8);
    spawnText(u.x + 25, u.y - 40, `+${pts}`, '#FFD700');

    // Ragdoll — fly away from explosion center
    const dx = u.x - cx, dy = u.y - cy;
    const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
    const dirX = dx / dist, dirY = dy / dist;
    u.flyVx = dirX * (300 + Math.random() * 250);
    u.flyVy = -(250 + Math.random() * 150);
    u.flyGravity = 400;
    u.flyRotation = 0;
    u.flyRotSpeed = (Math.random() < 0.5 ? -1 : 1) * (8 + Math.random() * 10);
    u.flyStartX = u.x;
    u.flyStartY = u.y;
    u.flyOffX = 0;
    u.flyOffY = 0;
    u.flyLanded = false;
    u.flyLandTimer = 0;
    u.flyOpacity = 1;
    u.facing = 'front';
  });

  scoreDisplayEl.textContent = score;
  if (killCount > 0) {
    setTimeout(() => {
      spawnText(cx, cy - 90, `${killCount} UNCLES DESTROYED!`, '#FFD700');
    }, 300);
    showNotif(`💥 BOMB: ${killCount} uncles obliterated!`);
  }
  checkWeaponUnlocks();
  checkLevelUp();

  // Check if new bombs earned from these kills
  const newBombsEarned = Math.floor(totalKills / 10) - Math.floor(prevKills / 10);
  if (newBombsEarned > 0) {
    bombCount += newBombsEarned;
    updateBombBtn();
    showNotif(`💣 +${newBombsEarned} MORE BOMB(S) EARNED!`);
    sfxWeaponUnlock();
  }
}

function hitTestClick(mx, my) {
  // Find uncle under click - taller hitbox
  const sorted = [...uncles].filter(u => u.state === 'walking').sort((a,b) => b.y - a.y);
  for (const u of sorted) {
    const s = depthScale(u.y);
    const hw = 32 * s; // half width (fatter)
    const hh = 75 * s; // full height above foot position (taller)
    if (mx > u.x - hw && mx < u.x + hw && my > u.y - hh && my < u.y + 50*s) {
      return u;
    }
  }
  return null;
}

// ---- WEAPON UNLOCKS ----
function checkWeaponUnlocks() {
  weapons.forEach((w, i) => {
    if (!unlockedWeapons[i] && score >= w.unlockScore) {
      unlockedWeapons[i] = true;
      showNotif(`${w.emoji} ${w.name} unlocked! (Key ${i+1})`);
      buildWeaponBar();
      sfxWeaponUnlock();
    }
  });
}

function checkLevelUp() {
  let newLevel = 1;
  for (let i = levelThresholds.length - 1; i >= 1; i--) {
    if (score >= levelThresholds[i]) { newLevel = i; break; }
  }
  if (newLevel > currentLevel) {
    currentLevel = newLevel;
    showNotif(`🎉 Level ${currentLevel}! Crowd threshold: ${getCrowdThreshold()}`);
    levelDisplayEl.textContent = `Level ${currentLevel}`;
    levelDisplayEl.classList.add('level-up');
    setTimeout(() => levelDisplayEl.classList.remove('level-up'), 600);
    sfxLevelUp();
  }
}

function getCrowdThreshold() {
  // Higher threshold at low levels (easier), gradual decrease as level goes up
  // Level 1: 20, Level 2: 19, Level 3: 18, ... Level 10: 10 (floor)
  return Math.max(10, 21 - currentLevel);
}

function showNotif(text) {
  notificationEl.textContent = text;
  notificationEl.classList.add('show');
  setTimeout(() => notificationEl.classList.remove('show'), 2500);
}

function buildWeaponBar() {
  weaponBarEl.innerHTML = '';
  weapons.forEach((w, i) => {
    const slot = document.createElement('div');
    slot.className = 'weapon-slot' + (i===currentWeapon?' active':'') + (!unlockedWeapons[i]?' locked':'');
    slot.innerHTML = `${w.emoji}<span class="key-hint">${i+1}</span>`;
    slot.title = `${w.name}: ${w.desc}`;
    slot.addEventListener('click', () => { if (unlockedWeapons[i]) { currentWeapon=i; buildWeaponBar(); } });
    weaponBarEl.appendChild(slot);
  });

  // Bomb button
  const bombBtn = document.createElement('div');
  bombBtn.id = 'bombBtn';
  bombBtn.className = bombCount > 0 ? 'ready' : '';
  bombBtn.innerHTML = `💣<span class="bomb-count-badge">${bombCount}</span><span class="bomb-key-hint">B</span>`;
  bombBtn.title = bombCount > 0 ? `Use Bomb! (${bombCount} available)` : 'Earn bombs: 1 per 10 kills';
  bombBtn.addEventListener('click', (e) => { e.stopPropagation(); useBomb(); buildWeaponBar(); });
  weaponBarEl.appendChild(bombBtn);
}

function updateBombBtn() {
  const btn = document.getElementById('bombBtn');
  if (!btn) return;
  btn.className = bombCount > 0 ? 'ready' : '';
  btn.querySelector('.bomb-count-badge').textContent = bombCount;
  btn.title = bombCount > 0 ? `Use Bomb! (${bombCount} available)` : 'Earn bombs: 1 per 10 kills';
}

function updateCrowdDisplay() {
  const active = uncles.filter(u => u.state === 'walking').length;
  const threshold = getCrowdThreshold();
  const pct = Math.min(active / threshold, 1);
  crowdTextEl.textContent = `${active}/${threshold}`;
  crowdBarEl.style.width = (pct * 100) + '%';
  // Color: green → yellow → red
  if (pct < 0.5) crowdBarEl.style.background = '#2ecc71';
  else if (pct < 0.8) crowdBarEl.style.background = '#f1c40f';
  else crowdBarEl.style.background = '#e74c3c';
}

// ---- GAME LOOP ----
let lastTime = 0;

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  let dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  // Bomb slow-motion effect: slow game time but keep particles/effects at full speed
  const rawDt = dt;
  if (bombSlowMo > 0) {
    dt = dt * 0.3; // game runs at 30% speed during slow-mo
  }

  if (gameState === 'playing') update(dt);
  // Update visual effects at full speed even in slow-mo
  if (bombSlowMo > 0) {
    bombSlowMo -= rawDt;
  }
  render();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  // Spawn (uses real time to avoid requestAnimationFrame throttling)
  const now = performance.now();
  const interval = Math.max(800, 2200 - totalSpawned * 18);
  if (now - lastSpawnTime >= interval) { lastSpawnTime = now; spawnUncle(); }

  // Update uncles
  for (let i=uncles.length-1; i>=0; i--) {
    const u = uncles[i];
    const dtS = dt / 1000;

    if (u.state === 'walking') {
      // Move toward target
      const dx = u.tx - u.x;
      const dy = u.ty - u.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const spd = u.speed * dtS;

      if (dist > 5) {
        u.x += (dx / dist) * spd;
        u.y += (dy / dist) * spd;
        // Determine facing — balanced so front/back are more common
        const absDx = Math.abs(dx), absDy = Math.abs(dy);
        if (absDx > absDy * 2.0) u.facing = dx > 0 ? 'right' : 'left';
        else u.facing = dy > 0 ? 'front' : 'back';
        u.walkPhase += dtS * 8;
      } else {
        // Reached waypoint, linger then go to next or leave
        u.lingerElapsed += dt;
        // Face front while lingering (looking at player)
        u.facing = 'front';
        // Idle slight sway
        u.walkPhase += dtS * 2;
        if (u.lingerElapsed >= u.lingerTime) {
          u.lingerElapsed = 0;
          u.waypointIdx++;
          if (u.waypointIdx < u.waypoints.length) {
            // Move to next waypoint
            const wp = u.waypoints[u.waypointIdx];
            u.tx = wp.x;
            u.ty = wp.y;
            u.lingerTime = wp.linger;
          } else {
            // All waypoints visited, leave
            u.state = 'leaving';
            if (Math.random() < 0.5) u.tx = u.x < W/2 ? -50 : W+50;
            else u.tx = Math.random() < 0.5 ? -50 : W+50;
            u.ty = rng(HORIZON + 40, GROUND_BOTTOM - 20);
          }
        }
      }

      // Clamp to play area
      u.y = Math.max(HORIZON + 20, Math.min(GROUND_BOTTOM, u.y));

    } else if (u.state === 'leaving') {
      const dx = u.tx - u.x;
      const dy = u.ty - u.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const spd = u.speed * 1.2 * dtS;
      u.x += (dx / dist) * spd;
      u.y += (dy / dist) * spd;
      const absDx2 = Math.abs(dx), absDy2 = Math.abs(dy);
      if (absDx2 > absDy2 * 2.0) u.facing = dx > 0 ? 'right' : 'left';
      else u.facing = dy > 0 ? 'front' : 'back';
      u.walkPhase += dtS * 10;

      if (u.x < -60 || u.x > W+60 || u.y < HORIZON-10) {
        // Uncle left the area
        if (!u.isBomb) {
          spawnText(Math.max(30, Math.min(W-30, u.x)), Math.max(HORIZON+30, u.y-30), 'ESCAPED!', '#e67e22');
          sfxEscape();
        }
        uncles.splice(i, 1);
      }
    } else if (u.state === 'hit') {
      u.hitTimer += dt;
      if (u.hitTimer > 600) uncles.splice(i, 1);
    } else if (u.state === 'flying') {
      u.hitTimer += dt;
      const dtS = dt / 1000;
      if (!u.flyLanded) {
        // Apply physics
        u.flyVy += u.flyGravity * dtS;
        u.flyOffX += u.flyVx * dtS;
        u.flyOffY += u.flyVy * dtS;
        u.flyRotation += u.flyRotSpeed * dtS;
        u.x = u.flyStartX + u.flyOffX;
        u.y = u.flyStartY + u.flyOffY;

        // Check if landed (back to ground level or below)
        if (u.flyOffY > 0 && u.hitTimer > 200) {
          u.flyLanded = true;
          u.flyLandTimer = 0;
          // Dust cloud on landing
          spawnParticles(u.x, u.y, '#a08060', 12);
          spawnParticles(u.x, u.y, '#c8b090', 8);
          spawnText(u.x, u.y - 20, '💫', '#f1c40f');
        }
      } else {
        // Landed — fade out on ground
        u.flyLandTimer += dt;
        u.flyOpacity = Math.max(0, 1 - u.flyLandTimer / 1200);
        if (u.flyLandTimer > 1200) uncles.splice(i, 1);
      }
    }
  }

  // Update punches
  for (let i=punches.length-1; i>=0; i--) {
    const p = punches[i];
    p.elapsed += dt / 1000;
    if (p.elapsed >= p.duration + 0.15) { punches.splice(i, 1); continue; }
  }

  checkPunchHits();

  // Crowd check: game over when uncles reach threshold, shake at 80%
  const activeUncles = uncles.filter(u => u.state === 'walking').length;
  const crowdThreshold = getCrowdThreshold();
  const shakeStart = Math.ceil(crowdThreshold * 0.8); // shake begins at 80% of threshold
  updateCrowdDisplay();

  // Game over — too many uncles!
  if (activeUncles >= crowdThreshold) {
    spawnText(W/2, 80, 'OVERRUN BY UNCLES!', '#e74c3c');
    spawnParticles(W/2, 90, '#e74c3c', 15);
    sfxCrowdPanic();
    gameOver();
  }

  // Screen shake warning zone (80% to 100% of threshold)
  if (activeUncles >= shakeStart && activeUncles < crowdThreshold) {
    const shakeProgress = (activeUncles - shakeStart) / (crowdThreshold - shakeStart);
    const crowdIntensity = 2 + shakeProgress * 8;
    shakeIntensity = Math.max(shakeIntensity, crowdIntensity);

    // Uncles taunt more when it's getting crowded
    uncles.forEach(u => {
      if (u.state === 'walking' && Math.random() < 0.006) {
        spawnText(u.x, u.y - 60 * depthScale(u.y), rnd(['HA!','HEH!','LOL!','CATCH US!','Maar ke dikhao!','Come on!','Too slow!']), '#e67e22');
      }
    });
  }

  // Random uncle taunts during normal play
  uncles.forEach(u => {
    if (u.state === 'walking' && Math.random() < 0.0015) {
      const taunts = [
        'Hit me if you can!', 'Maar mujhe maar!', 'Come on!!',
        'Pakad ke dikhao!', 'Too slow uncle!', 'Haha catch me!',
        'Beta tumse na ho payega!', 'Chal kya karega?',
        'Kya ukhaad lega?', 'Miss me? 😜', 'Over here!',
        'Maar ke dikhao!', 'Can\'t touch this!', 'Aaja aaja!',
        'Idhar dekh!', 'Hahaha!', 'Nikal le bhai!',
      ];
      spawnText(u.x, u.y - 60 * depthScale(u.y), rnd(taunts), '#e67e22');
    }
  });

  // Shake decay
  if (shakeIntensity > 0) {
    shakeX = (Math.random()-0.5)*shakeIntensity;
    shakeY = (Math.random()-0.5)*shakeIntensity;
    shakeIntensity *= 0.88;
    if (shakeIntensity < 0.5) { shakeIntensity=0; shakeX=0; shakeY=0; }
  }

  updateParticles(dt);
}

function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBg();

  // Draw scorch marks on ground (under uncles)
  drawScorchMarks();

  // Sort uncles by y for depth ordering (far = behind)
  const sortedUncles = [...uncles].sort((a, b) => a.y - b.y);
  sortedUncles.forEach(drawUncle);

  // Draw punches on top
  punches.forEach(drawPunch);

  // Shockwave rings (above uncles, below particles)
  drawShockwaves();

  drawParticles();

  // Red vignette warning when crowd approaches threshold
  if (gameState === 'playing') {
    const activeCount = uncles.filter(u => u.state === 'walking').length;
    const vigThreshold = getCrowdThreshold();
    const vigStart = Math.ceil(vigThreshold * 0.8);
    if (activeCount >= vigStart) {
      const progress = (activeCount - vigStart) / Math.max(1, vigThreshold - vigStart);
      const intensity = Math.min(progress * 0.25, 0.35);
      const pulse = intensity + Math.sin(Date.now() / 200) * 0.04;
      const vig = ctx.createRadialGradient(W/2, H/2, W*0.25, W/2, H/2, W*0.7);
      vig.addColorStop(0, 'rgba(255,0,0,0)');
      vig.addColorStop(1, `rgba(200,0,0,${pulse})`);
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // Bomb white flash overlay (on top of everything)
  if (bombFlash > 0.01) {
    ctx.globalAlpha = bombFlash;
    // Orange-white flash gradient from center
    const flashGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.6);
    flashGrad.addColorStop(0, '#FFFFFF');
    flashGrad.addColorStop(0.4, 'rgba(255,200,100,0.8)');
    flashGrad.addColorStop(1, 'rgba(255,100,0,0.3)');
    ctx.fillStyle = flashGrad;
    ctx.fillRect(-50, -50, W+100, H+100);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ---- INPUT ----
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width;
  const sy = H / rect.height;
  let cx2, cy2;
  if (e.touches) { cx2 = e.touches[0].clientX; cy2 = e.touches[0].clientY; }
  else { cx2 = e.clientX; cy2 = e.clientY; }
  return { x: (cx2 - rect.left)*sx, y: (cy2 - rect.top)*sy };
}

canvas.addEventListener('mousedown', handleClick);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); }, { passive: false });

function handleClick(e) {
  if (gameState !== 'playing') return;
  const pos = getCanvasPos(e);

  // Aim toward clicked uncle or clicked position
  const targetUncle = hitTestClick(pos.x, pos.y);
  if (targetUncle) {
    const s = depthScale(targetUncle.y);
    launchPunch(targetUncle.x, targetUncle.y - 15 * s);
  } else {
    launchPunch(pos.x, pos.y);
  }
}

document.addEventListener('keydown', (e) => {
  if (gameState !== 'playing') return;
  const n = parseInt(e.key);
  if (n>=1 && n<=5 && unlockedWeapons[n-1]) { currentWeapon=n-1; buildWeaponBar(); }
  if (e.key === 'b' || e.key === 'B') useBomb();
});

// ---- GAME STATE ----
function startGame() {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  gameState = 'playing';
  score = 0; currentWeapon = 0;
  currentLevel = 1;
  totalKills = 0; bombCount = 0; bombFlashTimer = 0;
  unlockedWeapons = [true, false, false, false, false];
  uncles.length = 0; punches.length = 0; particles.length = 0; textPopups.length = 0;
  shockwaves.length = 0; scorchMarks.length = 0;
  spawnTimer = 0; totalSpawned = 0; lastSpawnTime = performance.now();
  shakeIntensity = 0; shakeX = 0; shakeY = 0;
  bombFlash = 0; bombSlowMo = 0;
  lastTime = 0; // reset so gameLoop picks up fresh timestamp
  bgState.initialized = false; // regenerate background

  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  hudEl.classList.remove('hidden');
  weaponBarEl.classList.remove('hidden');
  levelDisplayEl.textContent = 'Level 1';

  scoreDisplayEl.textContent = '0';
  updateCrowdDisplay();
  buildWeaponBar();
  startMusic();
}

function gameOver() {
  gameState = 'gameover';
  stopMusic();
  sfxGameOver();
  if (score > highScore) { highScore = score; localStorage.setItem('uncleHighScore', highScore); }
  setTimeout(() => {
    hudEl.classList.add('hidden');
    weaponBarEl.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
    finalScoreEl.textContent = `Score: ${score} — Level ${currentLevel}`;
    gameOverHighScoreEl.textContent = `High Score: ${highScore}`;
  }, 800);
}

document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

function init() {
  startHighScoreEl.textContent = highScore > 0 ? `High Score: ${highScore}` : '';
  requestAnimationFrame(gameLoop);
}
init();
</script>
